
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  .dw { font-family: var(--font-sans); }

  .hdr { background: #0d0d0d; padding: 28px 32px; border-radius: var(--border-radius-lg); margin-bottom: 24px; display: flex; justify-content: space-between; align-items: center; }
  .hdr-ey { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
  .hdr-dot { width: 5px; height: 5px; border-radius: 50%; background: #C9A84C; animation: pulse 2.5s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.35} }
  .hdr-live { font-size: 9px; letter-spacing: 3px; text-transform: uppercase; color: rgba(201,168,76,0.6); font-weight: 500; }
  .hdr-name { color: #fff; font-size: 21px; font-weight: 500; letter-spacing: -0.3px; }
  .hdr-sub { color: rgba(255,255,255,0.28); font-size: 11px; margin-top: 5px; letter-spacing: 0.2px; }
  .hdr-right { display: flex; flex-direction: column; align-items: flex-end; gap: 10px; }
  .hdr-stats { display: flex; gap: 10px; }
  .stat { background: rgba(201,168,76,0.07); border: 0.5px solid rgba(201,168,76,0.2); border-radius: var(--border-radius-md); padding: 9px 16px; text-align: center; }
  .stat-n { color: #C9A84C; font-size: 22px; font-weight: 500; line-height: 1; font-variant-numeric: tabular-nums; }
  .stat-l { color: rgba(201,168,76,0.45); font-size: 9px; letter-spacing: 1.5px; text-transform: uppercase; margin-top: 3px; }
  .hdr-tag { font-size: 9px; letter-spacing: 2px; text-transform: uppercase; color: rgba(255,255,255,0.15); }

  .sec-t { font-size: 9px; font-weight: 500; letter-spacing: 3px; text-transform: uppercase; color: var(--color-text-secondary); margin-bottom: 14px; padding-left: 10px; border-left: 2px solid #C9A84C; opacity: 0.7; }

  .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(290px, 1fr)); gap: 14px; margin-bottom: 22px; }

  .card { background: var(--color-background-primary); border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-lg); overflow: hidden; transition: border-color 0.25s, transform 0.25s; }
  .card:hover { border-color: rgba(201,168,76,0.35); transform: translateY(-2px); }

  .card-hdr { background: #0d0d0d; padding: 12px 15px; display: flex; align-items: center; gap: 10px; }
  .card-num { background: rgba(201,168,76,0.12); border: 0.5px solid rgba(201,168,76,0.3); color: #C9A84C; font-size: 9px; font-weight: 500; width: 20px; height: 20px; border-radius: 50%; display: flex; align-items: center; justify-content: center; flex-shrink: 0; font-family: var(--font-mono); }
  .card-name { color: #fff; font-size: 12px; font-weight: 500; line-height: 1.3; }
  .card-rfc { color: rgba(201,168,76,0.65); font-size: 9.5px; font-family: var(--font-mono); margin-top: 2px; letter-spacing: 0.3px; }

  .card-body { padding: 12px 15px; }

  .card-img { width: 100%; height: 110px; border-radius: 6px; margin-bottom: 11px; object-fit: cover; border: 0.5px solid var(--color-border-tertiary); display: block; }

  .ir { display: flex; align-items: flex-start; gap: 8px; padding: 4px 0; border-bottom: 0.5px solid var(--color-border-tertiary); }
  .ir:last-child { border-bottom: none; }
  .il { font-size: 9px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.6px; color: var(--color-text-secondary); min-width: 64px; flex-shrink: 0; padding-top: 2px; opacity: 0.75; }
  .iv { font-size: 11.5px; color: var(--color-text-primary); line-height: 1.45; }

  .badges { display: flex; flex-wrap: wrap; gap: 4px; padding: 10px 0 2px; }
  .badge { font-size: 9.5px; font-weight: 500; padding: 2.5px 8px; border-radius: 20px; letter-spacing: 0.2px; }
  .bsi  { background: #d4edda; color: #155724; border: 0.5px solid #b8ddb8; }
  .bno  { background: #f8d7da; color: #721c24; border: 0.5px solid #f0b8bc; }
  .btr  { background: #fdf6e3; color: #7a6020; border: 0.5px solid #e8d9b0; }
  .bpos { background: #d1ecf1; color: #0c5460; border: 0.5px solid #9fd7e2; }
  .bact { background: #eaf5ea; color: #1a5c1a; border: 0.5px solid #b8ddb8; }

  .erow { display: flex; align-items: center; gap: 5px; }
  .edot { width: 5px; height: 5px; border-radius: 50%; background: #28a745; flex-shrink: 0; }
  .etxt { font-size: 11px; color: #28a745; font-weight: 500; }

  .divider { height: 0.5px; background: var(--color-border-tertiary); margin: 10px 0 8px; }

  .foot { background: #0d0d0d; border-radius: var(--border-radius-lg); padding: 13px 24px; display: flex; justify-content: space-between; align-items: center; }
  .fl { display: flex; align-items: center; gap: 10px; }
  .fline { width: 20px; height: 1px; background: rgba(201,168,76,0.35); }
  .ft { color: rgba(255,255,255,0.2); font-size: 9px; letter-spacing: 1.2px; text-transform: uppercase; }
  .fr { display: flex; align-items: center; gap: 7px; }
  .fi { width: 14px; height: 14px; border: 0.5px solid rgba(201,168,76,0.25); border-radius: 3px; display: flex; align-items: center; justify-content: center; }
  .fi-i { width: 5px; height: 5px; background: #C9A84C; border-radius: 1px; opacity: 0.6; }
  .ftag { color: rgba(255,255,255,0.15); font-size: 9px; letter-spacing: 2px; text-transform: uppercase; }
</style>

<div class="dw">
  <div class="hdr">
    <div>
      <div class="hdr-ey"><div class="hdr-dot"></div><span class="hdr-live">Portafolio Empresarial · En vivo</span></div>
      <div class="hdr-name">Reporte Ejecutivo de Empresas</div>
      <div class="hdr-sub">Información fiscal verificada · SAT México · 22 de abril de 2026</div>

  </div>
</div>

<script>

  const cls = val === 'SI' ? 'bsi' : val === 'NO' ? 'bno' : 'btr';
  const sym = val === 'SI' ? '✓' : val === 'NO' ? '✗' : '~';
  return `<span class="badge ${cls}">${label} ${sym}</span>`;
}

const data = [

const grid = document.getElementById('g');
data.forEach(c => {
  const suc = c.suc ? `<div class="ir"><span class="il">Sucursal</span><span class="iv">${c.suc}</span></div>` : '';
  const div = document.createElement('div');
  div.className = 'card';
  div.innerHTML = `

      <img class="card-img" src="/mnt/user-data/uploads/${c.img}" alt="${c.name}" onerror="this.style.display='none'"/>

    </div>`;
  grid.appendChild(div);

</script>
